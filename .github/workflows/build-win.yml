name: Build Installers

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python engine dependencies
        run: |
          pip install pyinstaller
          pip install -r python-engine/requirements.txt

      - name: Build sentinel-engine (macOS) with PyInstaller
        run: |
          pyinstaller \
            --onefile \
            --name sentinel-engine \
            --distpath python-engine/dist \
            --workpath python-engine/build \
            --specpath python-engine \
            --hidden-import flask \
            --hidden-import flask_cors \
            --hidden-import psutil \
            --hidden-import watchdog \
            --hidden-import watchdog.observers \
            --hidden-import watchdog.events \
            --hidden-import yara \
            --hidden-import requests \
            python-engine/main.py

      - name: Install and bundle ClamAV for macOS
        run: |
          brew install clamav dylibbundler
          # Update signatures
          sudo mkdir -p /opt/homebrew/var/lib/clamav
          sudo freshclam --config-file=/opt/homebrew/etc/clamav/freshclam.conf || true
          # Copy binary and signatures
          CLAMDIR="python-engine/dist/clamav-mac"
          LIBSDIR="$CLAMDIR/libs"
          mkdir -p "$LIBSDIR" "$CLAMDIR/database"
          cp /opt/homebrew/bin/clamscan "$CLAMDIR/clamscan"
          cp /opt/homebrew/var/lib/clamav/*.cvd /opt/homebrew/var/lib/clamav/*.cld "$CLAMDIR/database/" 2>/dev/null || true
          # Bundle all dylibs
          dylibbundler -od -b \
            -x "$CLAMDIR/clamscan" \
            -d "$LIBSDIR/" \
            -p @executable_path/libs/ \
            -s /opt/homebrew/lib \
            -s /opt/homebrew/opt/openssl@3/lib \
            -s /opt/homebrew/opt/json-c/lib \
            -s /opt/homebrew/opt/pcre2/lib \
            -s /opt/homebrew/Cellar/clamav/$(brew list --versions clamav | awk '{print $2}')/lib
          # Ad-hoc sign
          codesign --force --sign - "$CLAMDIR/clamscan"
          for f in "$LIBSDIR"/*.dylib; do codesign --force --sign - "$f"; done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Build macOS DMG + PKG
        run: npm run build-mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Re-sign app ad-hoc inside release folder
        run: |
          for APP in $(find release -name "*.app" -maxdepth 4); do
            echo "Re-signing: $APP"
            codesign --remove-signature "$APP" 2>/dev/null || true
            codesign --force --deep --sign - "$APP" 2>/dev/null || true
            xattr -cr "$APP" 2>/dev/null || true
          done
          find release -name "*.dmg" -exec xattr -cr {} \; 2>/dev/null || true
          find release -name "*.pkg" -exec xattr -cr {} \; 2>/dev/null || true

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Sentinel-Mac-Installer
          path: |
            release/*.dmg
            release/*.pkg
            release/*.yml
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python engine dependencies
        run: |
          pip install pyinstaller
          pip install -r python-engine/requirements.txt

      - name: Build sentinel-engine.exe with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --name sentinel-engine `
            --distpath python-engine/dist `
            --workpath python-engine/build `
            --specpath python-engine `
            --hidden-import flask `
            --hidden-import flask_cors `
            --hidden-import psutil `
            --hidden-import watchdog `
            --hidden-import watchdog.observers `
            --hidden-import watchdog.events `
            --hidden-import yara `
            --hidden-import requests `
            python-engine/main.py
        shell: pwsh

      - name: Download and bundle ClamAV portable
        run: |
          $clamUrl = "https://www.clamav.net/downloads/production/clamav-1.4.2.win.x64.zip"
          $clamZip = "clamav.zip"
          $clamDir = "python-engine/dist/clamav"
          Write-Host "Downloading ClamAV..."
          Invoke-WebRequest -Uri $clamUrl -OutFile $clamZip -UseBasicParsing
          Write-Host "Extracting ClamAV..."
          Expand-Archive -Path $clamZip -DestinationPath "clamav_tmp" -Force
          $extracted = Get-ChildItem "clamav_tmp" -Directory | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path $clamDir | Out-Null
          Copy-Item "$($extracted.FullName)\*" -Destination $clamDir -Recurse -Force
          # Create minimal clamd.conf and freshclam.conf so ClamAV runs without a daemon
          $confContent = "DatabaseDirectory $clamDir\database`r`nLogFile $clamDir\clam.log`r`nTempDir $env:TEMP"
          New-Item -ItemType Directory -Force -Path "$clamDir\database" | Out-Null
          $confContent | Out-File -FilePath "$clamDir\clamd.conf" -Encoding ASCII
          "DatabaseDirectory $clamDir\database`r`nUpdateLogFile $clamDir\freshclam.log" | Out-File -FilePath "$clamDir\freshclam.conf" -Encoding ASCII
          Write-Host "Downloading ClamAV signatures..."
          & "$clamDir\freshclam.exe" --config-file="$clamDir\freshclam.conf" 2>&1 | Write-Host
          Write-Host "ClamAV ready at $clamDir"
          Get-ChildItem $clamDir
        shell: pwsh
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Build Windows Electron installer
        run: npm run build-win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sentinel-Windows-Installer
          path: |
            release/*.exe
            release/*.yml
          retention-days: 30
